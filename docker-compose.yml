services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: local
      PORT: 8080
      DB_CONNECTION_URL: postgres://postgres:postgres@db:5432/app
      JWT_SECRET: demo_secret
      JWT_EXPIRY: 1y
    depends_on:
      - db

  frontend:
    image: faridmurshed9/jt-tech-analytica-fe
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BASE_URL: http://localhost:8080
    depends_on:
      - backend

  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: